services:
  - type: web
    name: trustguard-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: master
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: sqlite:///./trustguard.db
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HF_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
